name: Localizer Unit Tests

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"
    paths:
      - "localizer/**"
      - ".github/workflows/localizer-tests-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: localizer/tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest src/
